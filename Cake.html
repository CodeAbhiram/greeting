<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Birthday Cake 🎂</title>

  <link rel="stylesheet" href="cakestyle.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />

  <style>
/* Canvas sits BEHIND everything */
#celebrationCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1; /* behind cake and text */
}

/* Page content sits ABOVE canvas */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
}

#mainTitle {
  font-size: clamp(20px, 6vw, 32px);
  font-family: "Pixelify Sans", sans-serif;
  margin-bottom: 8px;
  line-height: 1.3;
  word-break: break-word;
}

#subTitle {
  font-size: clamp(14px, 4vw, 18px);
  font-family: "Pixelify Sans", sans-serif;
  color: #555;
  margin-bottom: 24px;
}

#hint {
  margin-top: 20px;
  font-size: clamp(11px, 3vw, 13px);
  font-family: "Pixelify Sans", sans-serif;
  color: #aaa;
  padding: 0 12px;
}

/* CSS confetti on very top */
.confetti-cannon-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5; /* above canvas, still below cake */
  overflow: hidden;
}

.confetti {
  position: absolute;
  top: -10px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
  </style>
</head>

<body>

<!-- Canvas rendered first, sits behind everything -->
<canvas id="celebrationCanvas"></canvas>

<div class="container">
  <div id="birthdayText"></div>
  <div class="cake-container">
    <div class="cake" id="cake"></div>
  </div>
  <p id="hint">🎤 Blow into the mic — or click anywhere!</p>
</div>

<div class="confetti-cannon-container"></div>

<script>
  /* NAME */
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name") || "Friend";
  document.getElementById("birthdayText").innerHTML = `
    <div id="mainTitle">Happy Birthday, ${name}! 🎂</div>
    <div id="subTitle">Make a wish and blow the candles!</div>
  `;

  /* CANDLES */
  const cake = document.getElementById("cake");
  const candleColorClasses = ["green-candle","purple-candle","blue-candle","yellow-candle"];

  function createCandles(count) {
    cake.innerHTML = "";
    const candlesPerRow = 6;
    const CAKE_VISUAL_WIDTH = 35;
    const CANDLE_VISUAL_WIDTH = 2;
    const shiftAmount = 4;
    for (let i = 0; i < count; i++) {
      const candle = document.createElement("div");
      candle.classList.add("candle", candleColorClasses[Math.floor(Math.random() * candleColorClasses.length)]);
      const row = Math.floor(i / candlesPerRow);
      const col = i % candlesPerRow;
      const totalCandlesInRow = Math.min(candlesPerRow, count - row * candlesPerRow);
      const rowSpacing = CAKE_VISUAL_WIDTH / (totalCandlesInRow + 1);
      const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
      const rowShift = row % 2 === 0 ? 0 : shiftAmount;
      candle.style.position = "absolute";
      candle.style.top = `${10 + row * 3}px`;
      candle.style.left = `${leftBase - rowShift + 4}px`;
      cake.appendChild(candle);
    }
  }
  createCandles(6);

  /* CANVAS */
  const canvas = document.getElementById("celebrationCanvas");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let animating = false;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const COLORS = ["#ff4d4d","#ffd93d","#4ecdc4","#a29bfe","#ff9ff3","#ff9900","#74b9ff","#ff6b6b"];

  /* BALLOON */
  class Balloon {
    constructor() {
      this.w = 28 + Math.random() * 16;
      this.h = this.w * 1.3;
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + this.h + 10;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.speedY = 1.8 + Math.random() * 1.5;
      this.sway = 0;
      this.swaySpeed = 0.03 + Math.random() * 0.02;
      this.done = false;
    }
    update() {
      this.sway += this.swaySpeed;
      this.x += Math.sin(this.sway) * 0.8;
      this.y -= this.speedY;
      if (this.y < -this.h - 20) this.done = true;
    }
    draw() {
      ctx.save();
      /* body */
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      /* shine */
      ctx.beginPath();
      ctx.ellipse(this.x - this.w * 0.15, this.y - this.h * 0.18, this.w * 0.12, this.h * 0.1, -0.5, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fill();
      /* string */
      ctx.beginPath();
      ctx.moveTo(this.x, this.y + this.h / 2 + 3);
      ctx.quadraticCurveTo(this.x + 8, this.y + this.h / 2 + 20, this.x, this.y + this.h / 2 + 40);
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }
  }

  /* SPARK */
  class Spark {
    constructor(x, y, color) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      this.x = x; this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.color = color;
      this.life = 1;
      this.decay = 0.018 + Math.random() * 0.012;
      this.size = 3 + Math.random() * 3;
      this.done = false;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.08;
      this.life -= this.decay;
      if (this.life <= 0) this.done = true;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.restore();
    }
  }

  function spawnFirework() {
    const x = canvas.width  * (0.15 + Math.random() * 0.7);
    const y = canvas.height * (0.1  + Math.random() * 0.5);
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    for (let i = 0; i < 60; i++) particles.push(new Spark(x, y, color));
  }

  /* LOOP */
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => !p.done);
    particles.forEach(p => { p.update(); p.draw(); });
    if (animating || particles.length > 0) requestAnimationFrame(loop);
  }

  /* CELEBRATION */
  let blown = false;

  function startCelebration() {
    animating = true;
    loop();

    let balloonCount = 0;
    const balloonInterval = setInterval(() => {
      for (let i = 0; i < 3; i++) particles.push(new Balloon());
      balloonCount += 3;
      if (balloonCount >= 18) clearInterval(balloonInterval);
    }, 400);

    let fwCount = 0;
    const fireworkInterval = setInterval(() => {
      spawnFirework();
      fwCount++;
      if (fwCount >= 10) {
        clearInterval(fireworkInterval);
        animating = false;
      }
    }, 600);

    createConfetti(140);
  }

  /* CONFETTI */
  function createConfetti(count) {
    const container = document.querySelector(".confetti-cannon-container");
    const colors = ["#ff4d4d","#ffd93d","#4ecdc4","#a29bfe","#ff9ff3","#ff6b6b","#74b9ff","#ff9900"];
    for (let i = 0; i < count; i++) {
      const c = document.createElement("div");
      c.classList.add("confetti");
      const size = Math.random() * 6 + 5;
      c.style.left = `${Math.random() * 100}vw`;
      c.style.width  = `${size}px`;
      c.style.height = `${size}px`;
      c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
      c.style.animationDuration = `${Math.random() * 2 + 3}s`;
      c.style.animationDelay    = `${Math.random() * 1.5}s`;
      container.appendChild(c);
      c.addEventListener("animationend", () => c.remove());
    }
  }

  /* BLOW */
  function blowOutCandles() {
    document.querySelectorAll(".candle").forEach(candle => {
      setTimeout(() => candle.classList.add("blown"), Math.random() * 800);
    });
    document.getElementById("subTitle").textContent = "🎉 Yay! Happy Birthday!";
    document.getElementById("hint").style.display = "none";
    setTimeout(startCelebration, 900);
  }

  /* MIC */
  async function startMicDetection() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source   = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      let previousVolume = 0;
      function detectBlow() {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        const avgVolume = sum / dataArray.length;
        const spike = avgVolume - previousVolume;
        if (avgVolume > 35 && spike > 15 && !blown) {
          blown = true;
          blowOutCandles();
        }
        previousVolume = avgVolume;
        requestAnimationFrame(detectBlow);
      }
      detectBlow();
    } catch(err) {
      console.log("Mic blocked → use click");
    }
  }

  document.body.addEventListener("click", () => {
    if (!blown) { blown = true; blowOutCandles(); }
  });

  startMicDetection();
</script>

</body>
</html>
