<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Birthday Cake 🎂</title>

  <link rel="stylesheet" href="cakestyle.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />

  <style>
#celebrationCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}
.container {
  position: relative;
  z-index: 10;
  text-align: center;
}
#mainTitle {
  font-size: clamp(20px, 6vw, 32px);
  font-family: "Pixelify Sans", sans-serif;
  margin-bottom: 8px;
}
#subTitle {
  font-size: clamp(14px, 4vw, 18px);
  font-family: "Pixelify Sans", sans-serif;
  color: #555;
  margin-bottom: 24px;
}
#hint {
  margin-top: 20px;
  font-size: clamp(11px, 3vw, 13px);
  font-family: "Pixelify Sans", sans-serif;
  color: #aaa;
}
.confetti-cannon-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 5;
  overflow: hidden;
}
.confetti {
  position: absolute;
  top: -10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
  </style>
</head>

<body>

<canvas id="celebrationCanvas"></canvas>

<div class="container">
  <div id="birthdayText"></div>
  <div class="cake-container">
    <div class="cake" id="cake"></div>
  </div>
  <p id="hint">🎤 Tap once to enable mic, then blow!</p>
</div>

<div class="confetti-cannon-container"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name") || "Friend";
  document.getElementById("birthdayText").innerHTML = `
    <div id="mainTitle">Happy Birthday, ${name}! 🎂</div>
    <div id="subTitle">Make a wish and blow the candles!</div>
  `;

  const cake = document.getElementById("cake");
  const candleColorClasses = ["green-candle","purple-candle","blue-candle","yellow-candle"];

  function createCandles(count) {
    cake.innerHTML = "";
    const candlesPerRow = 6;
    const CAKE_VISUAL_WIDTH = 35;
    const CANDLE_VISUAL_WIDTH = 2;
    const shiftAmount = 4;

    for (let i = 0; i < count; i++) {
      const candle = document.createElement("div");
      candle.classList.add("candle", candleColorClasses[Math.floor(Math.random() * candleColorClasses.length)]);

      const row = Math.floor(i / candlesPerRow);
      const col = i % candlesPerRow;
      const totalCandlesInRow = Math.min(candlesPerRow, count - row * candlesPerRow);
      const rowSpacing = CAKE_VISUAL_WIDTH / (totalCandlesInRow + 1);

      const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
      const rowShift = row % 2 === 0 ? 0 : shiftAmount;

      candle.style.position = "absolute";
      candle.style.top = `${10 + row * 3}px`;
      candle.style.left = `${leftBase - rowShift + 4}px`;

      cake.appendChild(candle);
    }
  }
  createCandles(6);

  const canvas = document.getElementById("celebrationCanvas");
  const ctx = canvas.getContext("2d");
  let particles = [];
  let animating = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  const COLORS = ["#ff4d4d","#ffd93d","#4ecdc4","#a29bfe","#ff9ff3","#ff9900","#74b9ff","#ff6b6b"];

  class Balloon {
    constructor() {
      this.w = 28 + Math.random() * 16;
      this.h = this.w * 1.3;
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + this.h + 10;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.speedY = 1.8 + Math.random() * 1.5;
      this.sway = 0;
      this.swaySpeed = 0.03 + Math.random() * 0.02;
      this.done = false;
    }
    update() {
      this.sway += this.swaySpeed;
      this.x += Math.sin(this.sway) * 0.8;
      this.y -= this.speedY;
      if (this.y < -this.h - 20) this.done = true;
    }
    draw() {
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  class Spark {
    constructor(x, y, color) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      this.x = x;
      this.y = y;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.color = color;
      this.life = 1;
      this.decay = 0.02;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
    }
    draw() {
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.fillRect(this.x, this.y, 3, 3);
      ctx.globalAlpha = 1;
    }
  }

  function spawnFirework() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height / 2;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    for (let i = 0; i < 50; i++) particles.push(new Spark(x, y, color));
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });
    if (animating) requestAnimationFrame(loop);
  }

  let blown = false;

  function startCelebration() {
    animating = true;
    loop();

    for (let i = 0; i < 15; i++) particles.push(new Balloon());

    let count = 0;
    const fw = setInterval(() => {
      spawnFirework();
      count++;
      if (count > 8) {
        clearInterval(fw);
        animating = false;
      }
    }, 500);

    createConfetti(120);
  }

  function createConfetti(count) {
    const container = document.querySelector(".confetti-cannon-container");
    for (let i = 0; i < count; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.backgroundColor = COLORS[Math.floor(Math.random() * COLORS.length)];
      c.style.width = "6px";
      c.style.height = "6px";
      c.style.animationDuration = (Math.random() * 2 + 3) + "s";
      container.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }
  }

  function blowOutCandles() {
    document.querySelectorAll(".candle").forEach(c => c.classList.add("blown"));
    document.getElementById("subTitle").textContent = "🎉 Yay! Happy Birthday!";
    document.getElementById("hint").style.display = "none";
    setTimeout(startCelebration, 800);
  }

  /* ✅ FIXED MIC LOGIC */
  async function startMicDetection() {
    try {
      console.log("Requesting mic...");

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      console.log("Mic access granted");

      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(stream);
      const analyser = audioContext.createAnalyser();

      analyser.fftSize = 512;
      source.connect(analyser);

      const dataArray = new Uint8Array(analyser.frequencyBinCount);

      function detectBlow() {
        analyser.getByteFrequencyData(dataArray);

        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];

        const avgVolume = sum / dataArray.length;

        console.log("Volume:", avgVolume);

        if (avgVolume > 25 && !blown) {
          console.log("Blow detected!");
          blown = true;
          blowOutCandles();
          return;
        }

        requestAnimationFrame(detectBlow);
      }

      detectBlow();

    } catch (err) {
      console.error("Mic error:", err);

      if (err.name === "NotAllowedError") {
        alert("Please allow microphone access.");
      } else if (err.name === "NotFoundError") {
        alert("No microphone detected.");
      } else {
        alert("Mic error: " + err.message);
      }
    }
  }

  let micStarted = false;

  document.body.addEventListener("click", async () => {
    if (!micStarted) {
      micStarted = true;
      await startMicDetection();
      document.getElementById("hint").textContent = "🎤 Blow now!";
    } else if (!blown) {
      blown = true;
      blowOutCandles();
    }
  });
</script>

</body>
</html>
